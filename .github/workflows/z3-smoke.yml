name: Z3 stack smoke test

# Build the Z3 stack images (zebra, zaino, zallet) from vendored source and
# prove the deploy/z3-stack/ bundle works end to end: zebra healthy, zaino
# serving lightwalletd gRPC, zallet answering wallet RPC with a node tip, no
# crash-loops, nothing exposed that shouldn't be. None of the checks need a
# synced chain, so the smoke phase takes minutes; the builds dominate.
#
# Each component builds in its own matrix job (= a separate GitHub job with
# its own success, cache export, and artifact), so a failure in one build or
# in the downstream smoke job never discards another component's cached
# layers or built image. Compile stages are always rebuilt fresh
# (no-cache-filters): a smoke run must never test a stale binary (observed
# 2026-07-17: a cached COPY layer served an image without the commit under
# test). The fresh build is made affordable by the 16-vCPU runner and by the
# three components building in parallel; base and apt layers still come from
# cache. Each build hands its exact image to the smoke job as an artifact, so
# smoke never rebuilds.
#
# Build definitions mirror deploy/z3-stack/docker-compose.build.yml; keep them
# in sync if you change contexts, Dockerfiles, or build args.

on:
  pull_request:
    paths:
      - "deploy/z3-stack/**"
      - "zebra/docker/Dockerfile"
      - "zebra/docker/entrypoint.sh"
      - "zaino/Dockerfile"
      - "zaino/entrypoint.sh"
      - "zallet/Dockerfile"
      - ".github/workflows/z3-smoke.yml"
  workflow_dispatch:
  # Called by release.yml: every release is gated on a green smoke run of the
  # exact commit being released. Added 2026-07-22 after v21 nearly shipped
  # zebra security carries whose PR touched none of the paths above, so no
  # smoke ran before the release was dispatched.
  workflow_call:
  schedule:
    # Weekly: catches interop breakage from subtree updates that don't touch
    # the paths above.
    - cron: "17 6 * * 1"

# packages: write is for pushing the GHCR build cache; on fork PRs GitHub
# forces the token to read-only, which is fine because PR runs write the
# ephemeral GHA cache instead (see the cache-to expression below).
permissions:
  contents: read
  packages: write

jobs:
  # One separate job per component (matrix legs are independent jobs). Each
  # builds its image FRESH, exports its build cache (base/apt layers warm the
  # next run), and uploads the exact image it built as an artifact for the
  # smoke job. `fail-fast: false` keeps a failure in one component from
  # cancelling the others, so their caches and artifacts still land.
  build:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: zero-zebra
            context: zebra
            dockerfile: zebra/docker/Dockerfile
            build_args: |
              FEATURES=release_max_level_info,progress-bar,prometheus
            no_cache_filters: release
            smoke_image: true
          - name: zero-zaino
            context: zaino
            dockerfile: zaino/Dockerfile
            build_args: |
              NO_TLS=true
            rust_toolchain_file: zaino/rust-toolchain.toml
            no_cache_filters: builder
            smoke_image: true
          - name: zero-zallet
            context: zallet
            dockerfile: zallet/Dockerfile
            build_args: |
              FEATURES=zaino,rpc-cli,zcashd-import
            no_cache_filters: builder
            smoke_image: true
          # Not part of the z3 stack; built here only to keep its build cache
          # warm (registry cache entries are refreshed only when read, and
          # zcashd is otherwise built solely on releases). Cache-warm only: no
          # no-cache-filters, no artifact, not consumed by smoke.
          - name: zero-zcashd
            context: zcashd
            dockerfile: docker/zcashd/Dockerfile
            build_args: ""
            no_cache_filters: ""
            smoke_image: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Needed to push the GHCR build cache; pulls of the public cache refs
      # are anonymous. On fork PRs the token is read-only, but those runs
      # don't write to the registry (see cache-to below).
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build args
        id: args
        run: |
          set -euo pipefail
          {
            echo "build_args<<BUILD_ARGS_EOF"
            printf '%s\n' "${{ matrix.build_args }}"
            if [ -n "${{ matrix.rust_toolchain_file }}" ]; then
              rv=$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
                   "${{ matrix.rust_toolchain_file }}" | head -n1)
              if ! [[ "$rv" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
                echo "::error::unexpected channel '${rv}' in ${{ matrix.rust_toolchain_file }}"
                exit 1
              fi
              echo "RUST_VERSION=${rv}"
            fi
            echo "BUILD_ARGS_EOF"
          } >> "$GITHUB_OUTPUT"

      # Authoritative build. `load` puts the image in this job's Docker daemon
      # so it can be saved as an artifact; the compile stage is rebuilt fresh
      # (no-cache-filters) for correctness; cache-to warms the cheap layers.
      # Cache refs are hardcoded lowercase (registry rejects the uppercase in
      # github.repository_owner). PR runs (read-only token) write the GHA
      # cache instead of the registry; every run reads both.
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: runtime
          platforms: linux/amd64
          load: ${{ matrix.smoke_image }}
          tags: ghcr.io/shieldedlabs/${{ matrix.name }}:smoke
          build-args: ${{ steps.args.outputs.build_args }}
          no-cache-filters: ${{ matrix.no_cache_filters }}
          cache-from: |
            type=registry,ref=ghcr.io/shieldedlabs/${{ matrix.name }}:buildcache
            type=gha,scope=${{ matrix.name }}
          cache-to: ${{ github.event_name == 'pull_request' && format('type=gha,mode=max,scope={0}', matrix.name) || format('type=registry,ref=ghcr.io/shieldedlabs/{0}:buildcache,mode=max,image-manifest=true', matrix.name) }}

      # Hand the exact built image to the smoke job. Artifacts (not a GHCR
      # push) so this works unchanged on fork PRs, where the token cannot
      # push images.
      - name: Export image artifact
        if: matrix.smoke_image
        run: |
          set -euxo pipefail
          docker save "ghcr.io/shieldedlabs/${{ matrix.name }}:smoke" \
            | zstd -T0 -3 > "${{ runner.temp }}/${{ matrix.name }}.tzst"

      - name: Upload image artifact
        if: matrix.smoke_image
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: ${{ runner.temp }}/${{ matrix.name }}.tzst
          retention-days: 1
          if-no-files-found: error

  smoke:
    needs: build
    # GitHub-hosted, NOT Blacksmith: zebra's mainnet P2P starves on Blacksmith
    # runners (peer handshakes succeed but no block ever downloads; observed
    # twice 2026-07-17, zebra pinned at Height(0) for the whole probe window,
    # which starves zaino's chain index and every downstream probe). The probes
    # are cheap; only the builds need the big runner.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ZERO_IMAGE_TAG: smoke
    defaults:
      run:
        working-directory: deploy/z3-stack
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download stack images
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          merge-multiple: true
          path: ${{ runner.temp }}/images

      - name: Load stack images
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          for f in "${{ runner.temp }}"/images/*.tzst; do
            zstd -d -c "$f" | docker load
          done
          docker image ls | grep shieldedlabs

      # All probe logic lives in deploy/z3-stack/smoke.sh (single source of
      # truth, also runnable locally against docker-compose.build.yml images
      # for ~2-minute iteration). The script prints one ok:/FAIL: line per
      # probe and dumps container state itself when a probe fails.
      - name: Wallet init, stack up, smoke probes
        run: ./smoke.sh --init --up

      - name: Dump state on failure
        if: failure()
        run: |
          docker compose ps || true
          # Full logs per container, not a tail: a crash-looping container
          # keeps every restart's output in one log, and the interesting
          # part (the first crash) is at the top.
          for c in zebra zaino zallet; do
            echo "::group::$c (RestartCount=$(docker inspect --format '{{.RestartCount}}' "$c" 2>/dev/null || echo '?'))"
            docker logs "$c" 2>&1 || true
            echo "::endgroup::"
          done
