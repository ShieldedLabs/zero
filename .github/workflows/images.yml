name: Images

# Build the Zero zebra and zcashd container images from vendored source and push
# them to GitHub Container Registry (GHCR). Runs when a release is published, or
# on demand. Images:
#   ghcr.io/<owner>/zero-zebra
#   ghcr.io/<owner>/zero-zcashd
#
# First publish: the GHCR packages are created private. Set them to Public once
# (Org -> Packages -> each package -> Package settings) so users can pull without
# authenticating.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref/tag to build (e.g. v3). Defaults to the triggering ref."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: zero-zebra
            context: zebra
            dockerfile: zebra/docker/Dockerfile
            build_args: |
              FEATURES=release_max_level_info,progress-bar,prometheus
          - name: zero-zcashd
            context: zcashd
            dockerfile: docker/zcashd/Dockerfile
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
