name: Images

# Build the Zero container images from vendored source and push them to GitHub
# Container Registry (GHCR). Runs when a release is published, or on demand.
# Images:
#   ghcr.io/<owner>/zero-zebra
#   ghcr.io/<owner>/zero-zcashd
#   ghcr.io/<owner>/zero-zaino   (built with NO_TLS=true: its gRPC serves
#                                 plaintext so it can bind non-loopback on a
#                                 private network; see deploy/z3-stack/README.md)
#   ghcr.io/<owner>/zero-zallet
#
# First publish: the GHCR packages are created private. Set them to Public once
# (Org -> Packages -> each package -> Package settings) so users can pull without
# authenticating.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref/tag to build (e.g. v3). Defaults to the triggering ref."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: zero-zebra
            context: zebra
            dockerfile: zebra/docker/Dockerfile
            build_args: |
              FEATURES=release_max_level_info,progress-bar,prometheus
          - name: zero-zcashd
            context: zcashd
            dockerfile: docker/zcashd/Dockerfile
            build_args: ""
          - name: zero-zaino
            context: zaino
            dockerfile: zaino/Dockerfile
            # gRPC binds non-loopback inside the compose network; without TLS
            # config zainod only allows that when built with the no-TLS
            # feature (zaino/packages/zainod/src/config.rs). Same trade-off as
            # upstream's "-no-tls" image tags.
            build_args: |
              NO_TLS=true
            # RUST_VERSION is appended by "Resolve build args" from this
            # file's `channel` (the Dockerfile deliberately has no default).
            rust_toolchain_file: zaino/rust-toolchain.toml
          - name: zero-zallet
            context: zallet
            dockerfile: zallet/Dockerfile
            # zaino backend: the z3-stack bundle feeds zallet over JSON-RPC;
            # the default zebra-state backend would require zebrad's indexer
            # gRPC and a shared state volume (see deploy/z3-stack/README.md).
            build_args: |
              FEATURES=zaino,rpc-cli,zcashd-import
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build args
        id: args
        run: |
          set -euo pipefail
          {
            echo "build_args<<BUILD_ARGS_EOF"
            printf '%s\n' "${{ matrix.build_args }}"
            if [ -n "${{ matrix.rust_toolchain_file }}" ]; then
              # zaino's tools/scripts/get-rust-version.sh resolves the git
              # root, which in this monorepo has no rust-toolchain.toml, so
              # read the channel from the vendored file directly.
              rv=$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
                   "${{ matrix.rust_toolchain_file }}" | head -n1)
              if ! [[ "$rv" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
                echo "::error::unexpected channel '${rv}' in ${{ matrix.rust_toolchain_file }}"
                exit 1
              fi
              echo "RUST_VERSION=${rv}"
            fi
            echo "BUILD_ARGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.args.outputs.build_args }}
          # Layer cache lives in GHCR as a `:buildcache` tag on each package
          # (no 10 GiB Actions quota, no 7-day expiry; z3-smoke shares the
          # same refs and keeps them warm). Hardcoded lowercase owner:
          # registry references reject the uppercase in repository_owner.
          # The gha cache-from is a transitional fallback; safe to drop once
          # the registry cache is populated.
          cache-from: |
            type=registry,ref=ghcr.io/shieldedlabs/${{ matrix.name }}:buildcache
            type=gha,scope=${{ matrix.name }}
          cache-to: type=registry,ref=ghcr.io/shieldedlabs/${{ matrix.name }}:buildcache,mode=max,image-manifest=true
