name: Release

# Manually-dispatched product release. Versions are monotonically increasing
# integers (v1, v2, v3, ...), not semver. Each release contains the six vendored
# component source ZIPs plus prebuilt binaries (currently zebrad, linux/x86_64).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (positive integer). Leave blank to auto-increment."
        required: false
        type: string

permissions:
  contents: write

jobs:
  # 1. Compute the version once, so nothing double-increments.
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refuse to release a pre-release zebra
        # Zebra's end-of-support check gives release candidates a 10-day fuse
        # (EOS_PANIC_AFTER in zebrad/src/components/sync/end_of_support.rs):
        # every image built from an -rc/-alpha/-beta zebra subtree stops
        # starting when mainnet passes the fuse height. Releases v6-v8 shipped
        # a 6.0.0-rc.0 zebra and all expired simultaneously at height
        # 3,410,520 (2026-07-13), taking operator deployments down. Only
        # release from a final zebra version.
        run: |
          set -euo pipefail
          zebra_version=$(sed -n 's/^version = "\(.*\)"/\1/p' zebra/zebrad/Cargo.toml | head -1)
          echo "zebra/zebrad version: ${zebra_version}"
          if [[ "$zebra_version" == *-* ]]; then
            echo "::error::zebra/zebrad is a pre-release (${zebra_version});" \
              "its end-of-support fuse is days, not months. Update the zebra" \
              "subtree to a final release before cutting a Zero release."
            exit 1
          fi
      - name: Determine version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$OVERRIDE" ]; then
            if ! [[ "$OVERRIDE" =~ ^[0-9]+$ ]]; then
              echo "::error::Version override must be a positive integer, got '$OVERRIDE'"
              exit 1
            fi
            next="$OVERRIDE"
          else
            latest=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
              | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -1 || true)
            next=$(( ${latest:-0} + 1 ))
          fi
          tag="v${next}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::error::Release $tag already exists"
            exit 1
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Next release: $tag (commit $GITHUB_SHA)"
      - name: Require a changelog section
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          # Extract this release's section from CHANGELOG.md (heading to next
          # "## "). Refuse to release without real content: retitle the
          # Unreleased section to "## ${TAG} - YYYY-MM-DD" before dispatching.
          awk -v tag="$TAG" '
            $0 ~ "^## "tag"([[:space:]]|$)" {on=1; next}
            /^## / {on=0}
            /^---$/ {on=0}
            on' CHANGELOG.md | sed '/^[[:space:]]*$/d' > section.md
          if ! [ -s section.md ]; then
            echo "::error::CHANGELOG.md has no non-empty '## ${TAG}' section." \
              "Write the release notes (retitle Unreleased to '## ${TAG} - $(date +%F)')," \
              "push, then re-dispatch."
            exit 1
          fi
          echo "Changelog section for ${TAG}:"
          cat section.md

  # 2. Stack smoke test: build the z3 images from this commit's vendored
  #    source and prove the deploy bundle comes up healthy. Runs in parallel
  #    with the source/binaries jobs; only the final publish job waits on it.
  #    This gates every release on a smoke run of the exact released commit,
  #    even when the changes touched none of z3-smoke's PR path filters
  #    (e.g. subtree-only security patches).
  smoke:
    needs: version
    uses: ./.github/workflows/z3-smoke.yml
    permissions:
      contents: read
      packages: write

  # 3. Source archives: one ZIP per vendored component (only tracked files).
  source:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Build component archives
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for c in zcashd zebra zaino zallet orchard librustzcash lightwalletd; do
            git archive --format=zip --prefix="${c}/" \
              -o "dist/${c}-${TAG}.zip" "HEAD:${c}"
          done
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: source-zips
          path: dist/*.zip
          if-no-files-found: error

  # 4. Prebuilt binaries. Matrix is one entry today; add rows for zainod/zallet
  #    or arm64 without touching the rest of the pipeline.
  binaries:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: zebra
            package: zebrad
            bin: zebrad
            # Drop ZF telemetry (sentry, opentelemetry); keep the useful release
            # features. getblocktemplate is not feature-gated, so mining RPCs are
            # always present.
            features: "release_max_level_info,progress-bar,prometheus"
            apt: "protobuf-compiler libclang-dev clang cmake"
            target_label: linux-x86_64
            runner: ubuntu-22.04   # older glibc floor for broad compatibility
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.component }}
      - name: Build ${{ matrix.bin }}
        working-directory: ${{ matrix.component }}
        run: |
          set -euo pipefail
          cargo build --locked --release \
            -p ${{ matrix.package }} --bin ${{ matrix.bin }} \
            --no-default-features --features "${{ matrix.features }}"
      - name: Package ${{ matrix.bin }}
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          out="${{ matrix.bin }}-${TAG}-${{ matrix.target_label }}"
          cp "${{ matrix.component }}/target/release/${{ matrix.bin }}" "dist/${out}"
          strip "dist/${out}"
          ( cd dist && sha256sum "${out}" > "${out}.sha256" )
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.bin }}-${{ matrix.target_label }}
          path: dist/*
          if-no-files-found: error

  # 5. Create the release once, with everything attached. Publishing waits on
  #    the smoke gate: a release must never exist for a commit whose stack
  #    doesn't come up.
  release:
    needs: [version, smoke, source, binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          ls -lh dist
          # Same extraction the version job validated.
          awk -v tag="$TAG" '
            $0 ~ "^## "tag"([[:space:]]|$)" {on=1; next}
            /^## / {on=0}
            /^---$/ {on=0}
            on' CHANGELOG.md > changes.md
          {
            echo "Zero release ${VERSION}, built from commit ${GITHUB_SHA}."
            echo
            echo "## Changes"
            cat changes.md
            echo
            echo "## Source archives"
            echo
            echo "One ZIP per vendored component (tracked source at the released commit):"
            echo
            for c in zcashd zebra zaino zallet orchard librustzcash lightwalletd; do
              echo "- \`${c}-${TAG}.zip\`"
            done
            echo
            echo "## Binaries"
            echo
            echo "Prebuilt for linux/x86_64 (built on ubuntu-22.04, glibc 2.35+; stripped)."
            echo "Telemetry disabled (no sentry/opentelemetry); getblocktemplate and"
            echo "prometheus metrics included."
            echo
            echo "- \`zebrad-${TAG}-linux-x86_64\` (with \`.sha256\`)"
            echo
            echo "> [!NOTE]"
            echo "> The \"Source code (zip)\" and \"Source code (tar.gz)\" entries are"
            echo "> generated automatically by GitHub from the tag. They are not part of"
            echo "> the Zero release; use the assets above."
          } > release-notes.md
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Zero $TAG" \
            --notes-file release-notes.md \
            dist/*
