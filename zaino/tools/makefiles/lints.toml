[tasks.fmt]
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.doc]
env = { RUSTDOCFLAGS = "-D warnings" }
command = "cargo"
args = ["doc", "--no-deps", "--all-features"]

[tasks.lint-boundary-conversions]
description = "Forbid From/TryFrom impls across the persistence and wire boundaries. Both must use named inherent methods (from_business/into_business for persistence; to_wire/try_from_wire for wire)."
# See CLAUDE.md §'Persistence-boundary conversions' and §'Wire-boundary
# conversions'. Reference implementations:
#   - packages/zaino-state/src/chain_index/types/db/block.rs     (DB)
#   - packages/zaino-state/src/chain_index/types/wire.rs         (wire)
script_runner = "bash"
script = [
    '''
    set -euo pipefail

    # === Persistence boundary ===
    # Matches either direction of a From/TryFrom where the `Persistent*`
    # side of the boundary appears.
    persistent_on_rhs='^[[:space:]]*impl[[:space:]]+(From|TryFrom)[[:space:]]*<[^>]*>[[:space:]]+for[[:space:]]+(Persistent|[A-Za-z0-9_:]+::Persistent)'
    persistent_on_lhs='^[[:space:]]*impl[[:space:]]+(From|TryFrom)[[:space:]]*<[^>]*Persistent[^>]*>[[:space:]]+for[[:space:]]+'

    # === Wire boundary ===
    # Matches either direction of a From/TryFrom where a zaino-proto type
    # (anything under `proto::` or a `::proto::` path) sits opposite a
    # business-layer target. We flag any impl that *mentions* a `proto::`
    # type on either side of a From/TryFrom — intentional because there
    # should be zero such impls once wire conversions are all named methods.
    proto_on_rhs='^[[:space:]]*impl[[:space:]]+(From|TryFrom)[[:space:]]*<[^>]*>[[:space:]]+for[[:space:]]+[A-Za-z0-9_:]*proto::'
    proto_on_lhs='^[[:space:]]*impl[[:space:]]+(From|TryFrom)[[:space:]]*<[^>]*proto::[^>]*>[[:space:]]+for[[:space:]]+'

    # Scan all Rust sources; exclude generated / vendored paths and the
    # zaino-proto package itself (it legitimately re-exports via prost-derived
    # Froms between scalar types).
    hits=$(
      git ls-files '*.rs' ':!target/*' ':!packages/zaino-proto/*' \
      | xargs -r grep -nE "$persistent_on_rhs|$persistent_on_lhs|$proto_on_rhs|$proto_on_lhs" \
      || true
    )

    if [ -n "$hits" ]; then
      echo ""
      echo "Boundary-conversion lint: forbidden From/TryFrom impls found."
      echo "Persistence boundary conversions must be named inherent methods on the"
      echo "Persistent* type (canonical: from_business / into_business)."
      echo "Wire boundary conversions must be named inherent methods on the"
      echo "business-layer type (canonical: to_wire / try_from_wire)."
      echo "See CLAUDE.md for the rules."
      echo ""
      echo "$hits"
      exit 1
    fi
    '''
]

[tasks.workbench-fmt]
command = "cargo"
args = ["fmt", "--manifest-path", "tools/workbench/Cargo.toml", "--", "--check"]

[tasks.workbench-clippy]
command = "cargo"
args = ["clippy", "--manifest-path", "tools/workbench/Cargo.toml", "--all-targets", "--", "-D", "warnings"]

[tasks.workbench-test]
command = "cargo"
args = ["test", "--manifest-path", "tools/workbench/Cargo.toml"]

[tasks.lint-workbench]
description = "Format-check, clippy, and test the workbench tooling crate (its own workspace, so the root --workspace lints/tests don't cover it)."
dependencies = ["workbench-fmt", "workbench-clippy", "workbench-test"]

[tasks.lint-toolchain-pin]
description = "Assert Dockerfile.deterministic's stagex/pallet-rust tag matches rust-toolchain.toml's channel (guards against rustc skew between the canonical toolchain and the deterministic build's base image)."
command = "cargo"
args = ["run", "-q", "--manifest-path", "tools/workbench/Cargo.toml", "--bin", "check-toolchain-pin"]

[tasks.lint-crypto-provider]
description = "Assert rustls resolves with aws-lc-rs + prefer-post-quantum and that the only ring-selecting feature edges are the tolerated zebra path (ADR-0006). Fails loud in both directions: new edges and vanished edges."
command = "cargo"
args = ["run", "-q", "--manifest-path", "tools/workbench/Cargo.toml", "--bin", "check-crypto-provider"]

[tasks.lint-no-openssl-apt]
description = "Fail if any Dockerfile installs a libssl*/openssl* apt package. TLS is rustls; the system-package companion to deny.toml's openssl crate ban."
command = "cargo"
args = ["run", "-q", "--manifest-path", "tools/workbench/Cargo.toml", "--bin", "check-no-openssl-apt"]

[tasks.deny]
description = "Enforce deny.toml's crate bans (openssl/openssl-sys/boring*). Scoped to `bans`: advisories/licenses have pre-existing failures (e.g. RUSTSEC-2022-0001 lmdb) tracked separately."
command = "cargo"
args = ["deny", "check", "bans"]

[tasks.lint-shell]
description = "Lint all shell scripts with shellcheck"
script_runner = "bash"
script = 'source "./tools/scripts/lint-shell.sh"'

[tasks.lint]
description = "Run all lints. Use as a pre-commit hook."
dependencies = [
    "fmt",
    "clippy",
    "doc",
    "lint-boundary-conversions",
    "lint-workbench",
    "lint-toolchain-pin",
    "lint-crypto-provider",
    "lint-no-openssl-apt",
    "deny",
    "lint-shell",
]

[tasks.toggle-hooks]
description = "Toggles the git config for core.hooksPath"
script = [
    '''
    set -euo pipefail

    current_path=$(git config --local --get core.hooksPath || echo "unset")
    new_path=".githooks/"
    if [ "$current_path" = "$new_path" ]; then
        echo "Disabling custom hooks path"
        git config --local --unset core.hooksPath
    else
        echo "Enabling custom hooks path"
        git config --local core.hooksPath $new_path
    fi
    '''
]
