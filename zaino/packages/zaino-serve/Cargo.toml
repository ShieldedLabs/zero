[package]
name = "zaino-serve"
description = "Crate containing Zingo's gRPC server implementation."
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
version = "0.4.0-rc.1"

[features]
default = []

# Test-only seam: the server `spawn_from_listener` methods, which serve on a
# pre-bound TcpListener so the test harness can bind 127.0.0.1:0 and hand the
# open socket over race-free. Not part of the production API.
test_dependencies = []

# Support for connecting to a zcashd validator node. Opt-in (default off, docs/adr/0005); being
# deprecated. Forwards to zaino-fetch and zaino-state. See
# docs/adr/0001-zcashd-support-feature-gate.md.
zcashd_support = ["zaino-fetch/zcashd_support", "zaino-state/zcashd_support"]

# Removes network restrictions.
no_tls_use_unencrypted_traffic = ["tonic/tls-native-roots"]

# Prometheus metrics emission (request counting / latency in gRPC handlers).
prometheus = ["metrics"]

# **Experimental and alpha features**
# Exposes the **complete** set of experimental / alpha features currently implemented in Zaino.
experimental_features = ["transparent_address_history_experimental"]

# Activates transparent address history capability in zaino
#
# NOTE: currently this is only implemented in the finalised state.
transparent_address_history_experimental = ["zaino-state/transparent_address_history_experimental"]

[dependencies]
zaino-proto = { workspace = true }
zaino-fetch = { workspace = true }
zaino-state = { workspace = true }

# Zebra
zebra-chain = { workspace = true }
zebra-rpc = { workspace = true }

# Tracing
tracing = { workspace = true }

# Metrics
metrics = { workspace = true, optional = true }

# Miscellaneous Workspace
tokio = { workspace = true, features = ["full"] }
tonic = { workspace = true, features = ["tls-native-roots", "tls-aws-lc"] }
thiserror = { workspace = true }
futures = { workspace = true }
jsonrpsee = { workspace = true, features = ["server", "macros"] }
serde = { workspace = true, features = ["derive"] }
tower = { workspace = true }
zaino-common.workspace = true
