# Required PR gate verifying that a PR's conventional-commit declaration is consistent with its code and changelog entries; changelog drafting lives in changelog-command.yml.
name: PR Gate

on:
  # `edited`, `labeled`, and `unlabeled` re-run the gate when the declaration or changelog waiver changes.
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]
  push:
    branches: [main]
  # Keeps this aggregator reporting if GitHub's native merge queue is ever enabled,
  # matching the sibling required-check workflows; jobs skip and the result skip-passes.
  merge_group:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  # dorny/paths-filter reads the changed-file list from the pull request API.
  pull-requests: read

env:
  CLICOLOR: 1

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      semver: ${{ steps.filter.outputs.semver || 'true' }}
      breaking: ${{ steps.title.outputs.breaking }}
      type: ${{ steps.title.outputs.type }}
      conventional: ${{ steps.title.outputs.conventional }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: .github/path-filters.yml
      - name: Read the declaration from the PR title
        id: title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          breaking_marker='^[a-z]+(\([^)]*\))?!:'
          conventional_marker='^([a-z]+)(\([^)]*\))?!?: .+'

          breaking=false
          type=
          conventional=false

          if [[ "$PR_TITLE" =~ $breaking_marker ]]; then
            breaking=true
          fi

          if [[ "$PR_TITLE" =~ $conventional_marker ]]; then
            conventional=true
            type="${BASH_REMATCH[1]}"
          elif [[ "$PR_TITLE" =~ ^([a-z]+) ]]; then
            type="${BASH_REMATCH[1]}"
          fi

          {
            echo "breaking=$breaking"
            echo "type=$type"
            echo "conventional=$conventional"
          } >> "$GITHUB_OUTPUT"

  semver-checks:
    needs: changes
    # Real work runs only on pull requests that change Rust and do not already declare a break
    # with `!`. A declared break is allowed through; release-plz majors the version at release.
    if: github.event_name == 'pull_request' && needs.changes.outputs.semver == 'true' && needs.changes.outputs.breaking == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check out the PR head, not the merge commit, so the API delta is the PR's own.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Compute the baseline from the PR's fork point
        id: baseline
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          echo "rev=$(git merge-base FETCH_HEAD HEAD)" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/setup-zebra-build
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          # Gate the consumer-facing library crates only. zebrad is a binary whose build script
          # needs test-only protos absent from the baseline; zebra-test and zebra-utils are test
          # and tooling crates whose feature-gated APIs are not stability surfaces.
          exclude: zebrad, zebra-test, zebra-utils
          feature-group: default-features
          baseline-rev: ${{ steps.baseline.outputs.rev }}

  changelog-gate:
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Check declaration and changelog narrative
        env:
          BASE_REF: ${{ github.base_ref }}
          BREAKING: ${{ needs.changes.outputs.breaking }}
          CONVENTIONAL: ${{ needs.changes.outputs.conventional }}
          DECLARED_TYPE: ${{ needs.changes.outputs.type }}
          CHANGELOG_WAIVED: ${{ contains(github.event.pull_request.labels.*.name, 'C-trivial') || contains(github.event.pull_request.labels.*.name, 'C-exclude-from-changelog') }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin "$BASE_REF"
          merge_base="$(git merge-base FETCH_HEAD HEAD)"

          allowed_type=false
          case "$DECLARED_TYPE" in
            feat|fix|perf|refactor|build|chore|docs|test|ci|style|revert|release)
              allowed_type=true
              ;;
          esac

          has_changelog=false
          has_breaking_heading=false
          code_changed=false
          while IFS= read -r -d '' path; do
            if [[ "${path##*/}" == "CHANGELOG.md" ]]; then
              has_changelog=true
              # Only the unreleased section counts, and its heading may predate this PR's diff.
              if [[ -f "$path" ]] && awk '
                /^## / { unreleased = ($0 ~ /^## \[Unreleased\]/) }
                unreleased && /^### Breaking Changes/ { found = 1 }
                END { exit !found }
              ' "$path"; then
                has_breaking_heading=true
              fi
            fi
            if [[ "$path" == *.rs || "${path##*/}" == "Cargo.toml" || "${path##*/}" == "Cargo.lock" ]]; then
              code_changed=true
            fi
          done < <(git diff --name-only -z "$merge_base"..HEAD)

          failed=false

          if [[ "$CONVENTIONAL" != "true" || "$allowed_type" != "true" ]]; then
            echo "::error title=Invalid PR title::Add a conventional commit PR title with an allowed type: feat, fix, perf, refactor, build, chore, docs, test, ci, style, revert, or release."
            failed=true
          fi

          if [[ "$DECLARED_TYPE" =~ ^(feat|fix|perf)$ && "$code_changed" == "true" && "$has_changelog" != "true" && "$CHANGELOG_WAIVED" != "true" ]]; then
            echo "::error title=Missing changelog entry::Add a CHANGELOG.md entry, or label the PR C-trivial or C-exclude-from-changelog."
            failed=true
          fi

          if [[ "$BREAKING" == "true" && "$has_breaking_heading" != "true" ]]; then
            echo "::error title=Missing breaking changes heading::Add a ### Breaking Changes section under ## [Unreleased] in a CHANGELOG.md changed by this PR."
            failed=true
          fi

          if [[ "$failed" == "true" ]]; then
            exit 1
          fi

  pr-gate-result:
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, semver-checks, changelog-gate]
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: semver-checks, changelog-gate
