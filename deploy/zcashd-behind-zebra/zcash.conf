# zcashd shielded behind Zebra.
#
# These two lines are the whole mitigation: zcashd makes one outbound P2P
# connection, to Zebra, and listens for nothing. This disables DNS seeding,
# peer discovery, and inbound listening, removing zcashd's network-facing
# attack surface.
#
# In this compose file "zebra" resolves to the Zebra container. Running zcashd
# and Zebra on the same host instead? Use connect=127.0.0.1:8233.
connect=zebra:8233
listen=0

# RPC for your wallet / mining pool. On the compose network only; port 8232 is
# not published to the host. CHANGE the password. For production, narrow
# rpcallowip to the specific client address(es). On a single host (non-Docker),
# use rpcbind=127.0.0.1 and rpcallowip=127.0.0.1.
server=1
rpcuser=zcashrpc
rpcpassword=CHANGE_ME
rpcport=8232
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
