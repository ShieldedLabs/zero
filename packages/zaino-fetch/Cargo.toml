[package]
name = "zaino-fetch"
description = "A mempool-fetching, chain-fetching and transaction submission service that uses zebra's RPC interface."
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
version = "0.2.1"

[features]
default = []

# Prometheus metrics emission (outbound RPC request counting / latency).
prometheus = ["metrics"]

# Support for connecting to a zcashd validator node. Opt-in (default off, docs/adr/0005); being
# deprecated. Gates the zcashd-shaped getpeerinfo parsing. Dropping it
# (`--no-default-features`) compiles zcashd parsing out. See
# docs/adr/0001-zcashd-support-feature-gate.md.
zcashd_support = []

[dependencies]
zaino-common = { workspace = true }
zaino-proto = { workspace = true }

# Zebra
zebra-chain = { workspace = true }
zebra-rpc = { workspace = true }

# Tracing
tracing = { workspace = true }

# Metrics
metrics = { workspace = true, optional = true }

# Miscellaneous Workspace
tokio = { workspace = true, features = ["full"] }
tonic = { workspace = true, features = ["tls-native-roots"] }
http = { workspace = true }
thiserror = { workspace = true }

# Miscellaneous Crate
prost = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
serde_json = { workspace = true, features = ["preserve_order"] }
serde = { workspace = true, features = ["derive"] }
hex = { workspace = true, features = ["serde"] }
indexmap = { workspace = true, features = ["serde"] }
base64 = { workspace = true }
jsonrpsee-types = { workspace = true }
derive_more = { workspace = true, features = ["from"] }

[dev-dependencies]
wire_serialized_transaction_test_data = { workspace = true }
